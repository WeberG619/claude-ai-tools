            width: 100vw;

            color: #333;
        }
        .slide li {
            margin-bottom: 15px;
            padding-left: 20px;
        }
        .slide li::marker {
            color: #3498DB;
        }
        .slide-number {
            position: absolute;
            bottom: 20px;
            right: 40px;
            font-size: 0.9em;
            color: #999;
        }
        .image-placeholder {
            background: linear-gradient(135deg, #3498DB22, #2C3E5022);
            border: 2px dashed #3498DB;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            color: #3498DB;
            margin-top: 30px;
        }
    </style>
