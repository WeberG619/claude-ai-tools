<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Team Monitor</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-green: #3fb950;
            --accent-yellow: #d29922;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            padding: 20px;
        }
        h1 { margin-bottom: 20px; font-size: 24px; }
        .agents {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .agent-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            min-width: 180px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .agent-card.speaking {
            border-color: var(--accent-green);
            background: rgba(63, 185, 80, 0.15);
            box-shadow: 0 0 20px rgba(63, 185, 80, 0.3);
        }
        .agent-card.speaking .status {
            color: var(--accent-green);
            font-weight: bold;
        }
        .agent-icon { font-size: 40px; margin-bottom: 10px; }
        .agent-name { font-size: 16px; font-weight: 600; margin-bottom: 5px; }
        .agent-voice { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
        .status { font-size: 14px; color: var(--text-secondary); }

        .wave {
            display: none;
            justify-content: center;
            gap: 3px;
            margin-top: 10px;
        }
        .speaking .wave { display: flex; }
        .wave span {
            width: 4px;
            height: 20px;
            background: var(--accent-green);
            border-radius: 2px;
            animation: wave 0.6s ease-in-out infinite;
        }
        .wave span:nth-child(2) { animation-delay: 0.1s; }
        .wave span:nth-child(3) { animation-delay: 0.2s; }
        .wave span:nth-child(4) { animation-delay: 0.3s; }
        .wave span:nth-child(5) { animation-delay: 0.4s; }
        @keyframes wave {
            0%, 100% { transform: scaleY(0.4); }
            50% { transform: scaleY(1); }
        }

        .current-task {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-yellow);
        }
        .task-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; }
        .task-text { font-size: 16px; }

        .log {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .log-time { color: var(--text-secondary); margin-right: 10px; }
        .log-entry.speech { color: var(--accent-green); }

        #last-update {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 11px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <h1>🎙️ Agent Team Live Monitor</h1>

    <div class="current-task" id="task-display">
        <div class="task-label">CURRENT TASK</div>
        <div class="task-text" id="task-text">Waiting for task...</div>
    </div>

    <div class="agents">
        <div class="agent-card" id="agent-planner">
            <div class="agent-icon">🎯</div>
            <div class="agent-name">PLANNER</div>
            <div class="agent-voice">Andrew</div>
            <div class="status">Idle</div>
            <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="agent-card" id="agent-researcher">
            <div class="agent-icon">🔍</div>
            <div class="agent-name">RESEARCHER</div>
            <div class="agent-voice">Guy</div>
            <div class="status">Idle</div>
            <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="agent-card" id="agent-builder">
            <div class="agent-icon">🔨</div>
            <div class="agent-name">BUILDER</div>
            <div class="agent-voice">Christopher</div>
            <div class="status">Idle</div>
            <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="agent-card" id="agent-critic">
            <div class="agent-icon">🔬</div>
            <div class="agent-name">CRITIC</div>
            <div class="agent-voice">Eric</div>
            <div class="status">Idle</div>
            <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="agent-card" id="agent-narrator">
            <div class="agent-icon">📢</div>
            <div class="agent-name">NARRATOR</div>
            <div class="agent-voice">Jenny</div>
            <div class="status">Idle</div>
            <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
    </div>

    <div class="log" id="activity-log">
        <div class="log-entry"><span class="log-time">--:--:--</span> Monitor started</div>
    </div>

    <div id="last-update">Last update: --</div>

    <script>
        let lastStatus = null;

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                updateUI(data);
            } catch (e) {
                console.error('Fetch error:', e);
            }
        }

        function updateUI(data) {
            // Update last update time
            document.getElementById('last-update').textContent =
                'Last update: ' + new Date().toLocaleTimeString();

            // Reset all cards
            document.querySelectorAll('.agent-card').forEach(card => {
                card.classList.remove('speaking');
                card.querySelector('.status').textContent = 'Idle';
            });

            // Update speaking agent
            if (data.agent && data.status === 'speaking') {
                const card = document.getElementById('agent-' + data.agent);
                if (card) {
                    card.classList.add('speaking');
                    card.querySelector('.status').textContent = '🎤 Speaking...';

                    // Log if new
                    if (lastStatus !== data.agent + '-speaking') {
                        addLog(`${data.role} is speaking`, 'speech');
                        lastStatus = data.agent + '-speaking';
                    }
                }
            } else {
                lastStatus = null;
            }

            // Update task if present
            if (data.task) {
                document.getElementById('task-text').textContent = data.task;
            }
        }

        function addLog(message, type = '') {
            const log = document.getElementById('activity-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.innerHTML = `<span class="log-time">${new Date().toLocaleTimeString()}</span>${message}`;
            log.insertBefore(entry, log.firstChild);

            // Limit entries
            while (log.children.length > 50) {
                log.removeChild(log.lastChild);
            }
        }

        // Poll every 500ms
        setInterval(fetchStatus, 500);
        fetchStatus();
    </script>
</body>
</html>
